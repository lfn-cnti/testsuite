apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: nginx-webapp
  name: nginx-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-webapp
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: nginx-webapp
    spec:
      containers:
      - image: busybox
        command: ["/bin/sh"]
        # Two distinct long-running process types in one container (sleep + tail) --
        # the multi-process anti-pattern that single_process_type must fail on.
        # Both are backgrounded and the shell ends on the `wait` builtin so it cannot
        # exec-optimize into one of them (which would make that child PID 1 instead).
        args: ["-c", "sleep infinity & tail -f /dev/null & wait"]
        name: sidecar-container1
        resources: {}
        volumeMounts:
          - name: var-logs
            mountPath: /var/log
      - image: busybox
        command: ["/bin/sh"]
        # Two distinct long-running process types in one container (sleep + tail) --
        # the multi-process anti-pattern that single_process_type must fail on.
        # Both are backgrounded and the shell ends on the `wait` builtin so it cannot
        # exec-optimize into one of them (which would make that child PID 1 instead).
        args: ["-c", "sleep infinity & tail -f /dev/null & wait"]
        name: sidecar-container2
        resources: {}
        volumeMounts:
          - name: var-logs
            mountPath: /var/log
      - image: nginx
        name: main-container
        resources: {}
        ports:
          - containerPort: 80
        volumeMounts:
          - name: var-logs
            mountPath: /usr/share/nginx/html
      dnsPolicy: Default
      volumes:
      - name: var-logs
        emptyDir: {}
status: {}

---

apiVersion: v1
kind: Service
metadata:
  name: nginx-webapp
  labels:
    run: nginx-webapp
spec:
  ports:
  - port: 80
    protocol: TCP
  selector:
    app: nginx-webapp
  type: NodePort
