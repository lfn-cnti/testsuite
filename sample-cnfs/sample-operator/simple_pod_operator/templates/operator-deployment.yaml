---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podset-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: podset-operator
  template:
    metadata:
      labels:
        app: podset-operator
    spec:
      serviceAccountName: podset-operator
      containers:
        - name: operator
          image: python:3.11-slim
          command: ["python", "-u", "-c"]
          args:
            - |
              import json, time, urllib.error, urllib.request, ssl
              from datetime import datetime, timezone

              # Namespace of operator
              NAMESPACE = open("/var/run/secrets/kubernetes.io/serviceaccount/namespace").read().strip()
              TOKEN = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
              CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              API = "https://kubernetes.default.svc"
              OPERATOR_LABEL = "podset-operator"

              ssl_context = ssl.create_default_context(cafile=CA_PATH)

              def request(path, method="GET", body=None, content_type="application/json"):
                  req = urllib.request.Request(API + path, method=method)
                  req.add_header("Authorization", "Bearer " + TOKEN)
                  if content_type:
                      req.add_header("Content-Type", content_type)
                  return urllib.request.urlopen(req, data=body, context=ssl_context).read()

              def update_podset_status(name, ready_replicas, total_replicas):
                  """Update PodSet status with Ready condition"""
                  is_ready = ready_replicas == total_replicas
                  status_obj = {
                      "status": {
                          "readyReplicas": ready_replicas,
                          "conditions": [
                              {
                                  "type": "Ready",
                                  "status": "True" if is_ready else "False",
                                  "lastTransitionTime": datetime.now(timezone.utc).isoformat(),
                                  "reason": "AllPodsReady" if is_ready else "PodsNotReady",
                                  "message": f"{ready_replicas}/{total_replicas} pods ready"
                              }
                          ]
                      }
                  }
                  try:
                      request(f"/apis/demo.example.com/v1/namespaces/{NAMESPACE}/podsets/{name}/status", 
                              "PATCH", json.dumps(status_obj).encode(), 
                              content_type="application/merge-patch+json")
                      print(f"Updated status for PodSet '{name}': {ready_replicas}/{total_replicas} pods ready, Ready={is_ready}")
                  except Exception as e:
                      print(f"Failed to update status for PodSet '{name}': {e}")

              def build_owner_references(name, uid, api_version):
                  return [{
                      "apiVersion": api_version,
                      "kind": "PodSet",
                      "name": name,
                      "uid": uid,
                      "controller": True,
                      "blockOwnerDeletion": True
                  }]

              def reconcile_deployment(podset):
                  name = podset["metadata"]["name"]
                  spec = podset.get("spec", {})
                  replicas = spec.get("replicas", 1)
                  image = spec.get("image", "nginx")
                  deployment_name = spec.get("podNamePrefix", name)

                  original_labels = podset.get("metadata", {}).get("labels", {"app": name})
                  podset_uid = podset.get("metadata", {}).get("uid", "")
                  podset_api_version = podset.get("apiVersion", "demo.example.com/v1")

                  use_owner_references = "owned" in name.lower()
                  use_labels = "labeled" in name.lower()

                  selector_labels = {
                      "app.kubernetes.io/name": deployment_name,
                      "app.kubernetes.io/managed-by": OPERATOR_LABEL
                  }
                  pod_labels = dict(selector_labels)
                  pod_labels["podset.demo.example.com/name"] = name

                  deployment_labels = {
                      "app.kubernetes.io/managed-by": OPERATOR_LABEL,
                      "podset.demo.example.com/name": name
                  }

                  owner_references = []

                  if use_labels:
                      deployment_labels.update(original_labels)
                      pod_labels.update(original_labels)
                      print(f"Reconciling labeled deployment '{deployment_name}' for PodSet '{name}' (deployment and pods are labeled)")
                  elif use_owner_references:
                      owner_references = build_owner_references(name, podset_uid, podset_api_version)
                      print(f"Reconciling owned deployment '{deployment_name}' for PodSet '{name}' (identified by ownerReferences)")
                  else:
                      deployment_labels.update(original_labels)
                      pod_labels.update(original_labels)
                      owner_references = build_owner_references(name, podset_uid, podset_api_version)
                      print(f"Reconciling deployment '{deployment_name}' for PodSet '{name}' with labels on deployment/pods and ownerReferences")

                  deployment = {
                      "apiVersion": "apps/v1",
                      "kind": "Deployment",
                      "metadata": {
                          "name": deployment_name,
                          "labels": deployment_labels,
                          "ownerReferences": owner_references
                      },
                      "spec": {
                          "replicas": replicas,
                          "selector": {
                              "matchLabels": selector_labels
                          },
                          "template": {
                              "metadata": {
                                  "labels": pod_labels
                              },
                              "spec": {
                                  "containers": [{"name": "app", "image": image}]
                              }
                          }
                      }
                  }

                  deployment_path = f"/apis/apps/v1/namespaces/{NAMESPACE}/deployments/{deployment_name}"
                  try:
                      request(deployment_path)
                      request(
                          deployment_path,
                          "PATCH",
                          json.dumps(deployment).encode(),
                          content_type="application/merge-patch+json"
                      )
                      print(f"Updated deployment '{deployment_name}' for PodSet '{name}'")
                  except urllib.error.HTTPError as error:
                      if error.code != 404:
                          raise
                      request(
                          f"/apis/apps/v1/namespaces/{NAMESPACE}/deployments",
                          "POST",
                          json.dumps(deployment).encode()
                      )
                      print(f"Created deployment '{deployment_name}' for PodSet '{name}'")

                  deployment_state = json.loads(request(deployment_path))
                  ready_replicas = deployment_state.get("status", {}).get("readyReplicas", 0)
                  return deployment_name, ready_replicas, replicas

              def delete_orphan_deployments(active_deployments):
                  try:
                      deployments_raw = request(f"/apis/apps/v1/namespaces/{NAMESPACE}/deployments")
                      deployments = json.loads(deployments_raw).get("items", [])
                  except Exception as error:
                      print(f"Failed to list deployments for orphan cleanup: {error}")
                      return

                  for deployment in deployments:
                      metadata = deployment.get("metadata", {})
                      labels = metadata.get("labels", {})
                      deployment_name = metadata.get("name", "")

                      if labels.get("app.kubernetes.io/managed-by") != OPERATOR_LABEL:
                          continue
                      if deployment_name in active_deployments:
                          continue

                      try:
                          request(
                              f"/apis/apps/v1/namespaces/{NAMESPACE}/deployments/{deployment_name}",
                              "DELETE"
                          )
                          print(f"Deleted orphan deployment '{deployment_name}'")
                      except Exception as error:
                          print(f"Failed to delete orphan deployment '{deployment_name}': {error}")

              print("Starting PodSet operator in namespace:", NAMESPACE)

              while True:
                  try:
                      print("Polling for PodSets...")
                      podsets_raw = request(f"/apis/demo.example.com/v1/namespaces/{NAMESPACE}/podsets")
                      podsets = json.loads(podsets_raw)

                      podset_items = podsets.get("items", [])
                      active_deployments = set()

                      print(f"Found {len(podset_items)} PodSet(s)")

                      for ps in podset_items:
                          name = ps["metadata"]["name"]
                          deployment_name, ready_count, replicas = reconcile_deployment(ps)
                          active_deployments.add(deployment_name)
                          update_podset_status(name, ready_count, replicas)

                      delete_orphan_deployments(active_deployments)

                  except Exception as e:
                      print("Error:", e)

                  time.sleep({{ .Values.pollInterval | default 5 | int }})

