apiVersion: v1
kind: ServiceAccount
metadata:
  name: podset-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: podset-operator
rules:
  - apiGroups: ["demo.example.com"]
    resources: ["podsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["demo.example.com"]
    resources: ["podsets/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: podset-operator
subjects:
  - kind: ServiceAccount
    name: podset-operator
roleRef:
  kind: Role
  name: podset-operator
  apiGroup: rbac.authorization.k8s.io

