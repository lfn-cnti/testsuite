name: Crystal Specs
on:
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request:
    paths:
      - '**'
      - '!**.md'
      - '!docs/*'
      - '!doc-lint/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Fetch Matrix Tests
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      chaos_matrix: ${{ steps.set-matrix.outputs.chaos_matrix }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: set-matrix
      run: |
        set -uo pipefail

        # Guard: every spec example must carry a tag (directly, or inherited from
        # an enclosing describe/context). Untagged examples are silently never
        # scheduled by the tag-sharded matrix below, so fail fast if any exist.
        UNTAGGED=$(awk '
          function indent(s) { match(s, /^ */); return RLENGTH }
          FNR==1 { top=0 }
          /^[[:space:]]*(describe|context)[[:space:]]/ {
            ind=indent($0); while (top>0 && sind[top]>=ind) top--
            top++; sind[top]=ind; stag[top]=($0 ~ /tags:/)?1:0; next
          }
          /^[[:space:]]*(it|specify|pending)[[:space:]]*"/ {
            ind=indent($0); while (top>0 && sind[top]>=ind) top--
            t=($0 ~ /tags:/)?1:0
            if (!t) for (i=1;i<=top;i++) if (stag[i]) { t=1; break }
            if (!t) print FILENAME":"FNR": "$0
          }' $(find spec -name "*.cr" | sort))
        if [ -n "$UNTAGGED" ]; then
          echo "::error::Spec examples without a tag would never run in CI:"
          echo "$UNTAGGED"
          exit 1
        fi

        # All distinct tags used across specs.
        mapfile -t ALL_TAGS < <(grep -roP --no-filename 'tags: \K(\[|")(.*)(\]|")' spec/ \
          | tr -d '[],' | tr -s '\n' ' ' | xargs -n1 | sed 's/:/_/g' | sort -u)

        # Single source of truth for tags kept OUT of the default spec matrix:
        #  - CHAOS_TAGS run in the dedicated `chaos` job, whose matrix is derived
        #    from this same list (so the two can never drift or double-run).
        #  - EXTRA_SKIP: flaky, or handled elsewhere (free5gc -> nightly workflow).
        CHAOS_TAGS=(pod_delete pod_io_stress pod_memory_hog pod_network_latency disk_fill pod_network_corruption pod_network_duplication zombie oran)
        EXTRA_SKIP=(5g core shared_database_flaky free5gc)
        EXCLUDED=("${CHAOS_TAGS[@]}" "${EXTRA_SKIP[@]}")

        contains() { local n=$1; shift; local x; for x in "$@"; do [ "$x" = "$n" ] && return 0; done; return 1; }

        # Drift guard: every excluded/chaos tag must still exist in spec/.
        MISSING=()
        for ex in "${EXCLUDED[@]}"; do contains "$ex" "${ALL_TAGS[@]}" || MISSING+=("$ex"); done
        if [ ${#MISSING[@]} -ne 0 ]; then
          echo "::error::Excluded/chaos tags not found in spec/ (typo or removed?): ${MISSING[*]}"
          exit 1
        fi

        build_json() { local key=$1; shift; local out='{"include":[' first=1 t
          for t in "$@"; do [ $first -eq 1 ] && first=0 || out+=","; out+="{\"$key\":\"$t\"}"; done
          echo "$out]}"; }

        SPEC_TAGS=()
        for t in "${ALL_TAGS[@]}"; do contains "$t" "${EXCLUDED[@]}" || SPEC_TAGS+=("$t"); done

        echo "matrix=$(build_json spec "${SPEC_TAGS[@]}")" >> "$GITHUB_OUTPUT"
        echo "chaos_matrix=$(build_json tag "${CHAOS_TAGS[@]}")" >> "$GITHUB_OUTPUT"
        echo "Spec shards: ${#SPEC_TAGS[@]} | Chaos shards: ${#CHAOS_TAGS[@]}"

  spec:
    name: Crystal Specs
    needs: [tests]
    runs-on: [v1.0.0]
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.tests.outputs.matrix)}}
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
    - name: Sign in to Docker Hub with Helm
      run: |
        helm registry login \
          --username ${{ secrets.DOCKERHUB_USERNAME }} \
          --password ${{ secrets.DOCKERHUB_PASSWORD }} \
          registry-1.docker.io
    - name: Cleanup Tmp DIR
      run: |
        sudo rm -rf /tmp/*
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Configuration file that can be consumed by the Pod Security Admission Controller
      run: |
        export CLUSTER=$(uuidgen)
        echo "export CLUSTER=$CLUSTER"
        echo "export CLUSTER=$CLUSTER" > cluster.env
        mkdir -p /shared/pss
        cat <<EOF > /shared/pss/cluster-level-pss.$CLUSTER.yaml
        apiVersion: apiserver.config.k8s.io/v1
        kind: AdmissionConfiguration
        plugins:
        - name: PodSecurity
          configuration:
            apiVersion: pod-security.admission.config.k8s.io/v1
            kind: PodSecurityConfiguration
            defaults:
              enforce: "restricted"
              enforce-version: "latest"
              audit: "restricted"
              audit-version: "latest"
              warn: "restricted"
              warn-version: "latest"
            exemptions:
              usernames: []
              runtimeClasses: []
              namespaces:
                - kube-system
                - local-path-storage
        EOF
    - name: Mirror Setup
      run: |
        source cluster.env
        cat << EOF > /tmp/cluster.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        containerdConfigPatches:
        - |-
          root = "/tmp/containerd"
        nodes:
        - role: control-plane
          kubeadmConfigPatches:
          - |
            kind: ClusterConfiguration
            apiServer:
              extraArgs:
                admission-control-config-file: /shared/pss/cluster-level-pss.$CLUSTER.yaml
              extraVolumes:
                - name: accf
                  hostPath: /shared/pss
                  mountPath: /shared/pss
                  readOnly: false
                  pathType: "DirectoryOrCreate"
            etcd:
              local:
                dataDir: /tmp/etcd
          extraMounts:
          - hostPath: /shared/pss
            containerPath: /shared/pss
            readOnly: false
            selinuxRelabel: false
            propagation: None
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        EOF
    - name: sysctls specs kind config override
      if: matrix.spec == 'sysctls'
      run: |
        source cluster.env
        cat << EOF > /tmp/cluster.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        containerdConfigPatches:
        - |-
          root = "/tmp/containerd"
        nodes:
        - role: control-plane
          kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            allowedUnsafeSysctls: ["kernel.msg*"]
          - |
            kind: ClusterConfiguration
            apiServer:
              extraArgs:
                admission-control-config-file: /shared/pss/cluster-level-pss.$CLUSTER.yaml
              extraVolumes:
                - name: accf
                  hostPath: /shared/pss
                  mountPath: /shared/pss
                  readOnly: false
                  pathType: "DirectoryOrCreate"
            etcd:
              local:
                dataDir: /tmp/etcd
          extraMounts:
          - hostPath: /shared/pss
            containerPath: /shared/pss
            readOnly: false
            selinuxRelabel: false
            propagation: None
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        EOF
    - name: Mirror Override
      if: startsWith(matrix.spec, 'private_registry_')
      run: |
        source cluster.env
        cat << EOF > /tmp/cluster.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        containerdConfigPatches:
        - |-
          root = "/tmp/containerd"
          [plugins."io.containerd.grpc.v1.cri".registry]
            config_path = "/etc/containerd/certs.d"
        nodes:
        - role: control-plane
          kubeadmConfigPatches:
          - |
            kind: ClusterConfiguration
            apiServer:
              extraArgs:
                admission-control-config-file: /shared/pss/cluster-level-pss.$CLUSTER.yaml
              extraVolumes:
                - name: accf
                  hostPath: /shared/pss
                  mountPath: /shared/pss
                  readOnly: false
                  pathType: "DirectoryOrCreate"
            etcd:
              local:
                dataDir: /tmp/etcd
          extraMounts:
          - hostPath: /shared/pss
            containerPath: /shared/pss
            readOnly: false
            selinuxRelabel: false
            propagation: None
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        EOF
    - name: Cluster API Override
      if: matrix.spec == 'cluster-api' || matrix.spec == 'platform'
      run: |
        source cluster.env
        cat << EOF > /tmp/cluster.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        containerdConfigPatches:
        - |-
          root = "/tmp/containerd"
        nodes:
        - role: control-plane
          kubeadmConfigPatches:
          - |
            kind: ClusterConfiguration
            etcd:
              local:
                dataDir: /tmp/etcd
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
          - hostPath: /var/run/docker.sock
            containerPath: /var/run/docker.sock
        EOF
    - name: Install kind
      uses: ./.github/actions/install-kind
    - name: Create Kind Cluster 
      run: |
        cat /tmp/cluster.yml
        source cluster.env
        echo kind create cluster --name $CLUSTER --config=/tmp/cluster.yml --kubeconfig ./$CLUSTER.conf --retain --wait 5m
        kind --version
        kind create cluster --name $CLUSTER --config=/tmp/cluster.yml --kubeconfig ./$CLUSTER.conf --retain --wait 5m
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        kubectl get nodes
    - name: Configure registry mirror (private_registry)
      if: startsWith(matrix.spec, 'private_registry_')
      run: |
        # containerd 2.x (shipped in newer kind node images) removed the inline
        # registry.mirrors config; configure the mirror via the config_path
        # hosts.toml mechanism instead (set in the cluster's containerdConfigPatches).
        source cluster.env
        REG="registry.default.svc.cluster.local:5000"
        docker exec "$CLUSTER-control-plane" mkdir -p "/etc/containerd/certs.d/$REG"
        docker exec -i "$CLUSTER-control-plane" sh -c "cat > '/etc/containerd/certs.d/$REG/hosts.toml'" <<'HOSTS'
        server = "http://localhost:5000"
        [host."http://localhost:5000"]
          capabilities = ["pull", "resolve"]
        HOSTS
    - name: Setup CNF-Conformance
      run: |
        git fetch --all --tags --force
        shards install  
        echo "RUNNER: $RUNNER_NAME"
    - name: Run Crystal Spec
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        DOCKERHUB_EMAIL: ${{ secrets.DOCKERHUB_EMAIL }}
        IMAGE_REPO: ${{ secrets.IMAGE_REPO }}
      run: |
        EMAIL_ARRAY=($DOCKERHUB_EMAIL)
        IMAGE_ARRAY=($IMAGE_REPO)
        RANDOMIZER=$(( 0 + $RANDOM % 3 ))
        export PROTECTED_DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
        export PROTECTED_DOCKERHUB_PASSWORD=$DOCKERHUB_PASSWORD
        export PROTECTED_DOCKERHUB_EMAIL=${EMAIL_ARRAY[$RANDOMIZER]}
        export PROTECTED_IMAGE_REPO=${IMAGE_ARRAY[$RANDOMIZER]}
        source cluster.env
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        until [[ $(kubectl get pods -l app=local-path-provisioner --namespace=local-path-storage -o 'jsonpath={..status.conditions[?(@.type=="Ready")].status}') == "True" ]]; do
            echo "Waiting for local-path-storage"
            sleep 1
        done
        LOCAL_PATH_STORAGE_POD=$(kubectl get pods -l app=local-path-provisioner --namespace=local-path-storage -o jsonpath='{range .items[*]}{.metadata.name}')
        #        until [[ $(kubectl exec -ti $LOCAL_PATH_STORAGE_POD --namespace=local-path-storage -- apk add curl jq) ]]; do
        #   echo "Failed to install packages, retrying"
        #   sleep 1
        #done
        crystal build src/cnf-testsuite.cr 
        ./cnf-testsuite setup 
        # cnf-testsuite was already built above; skip spec_helper's redundant rebuild.
        CNF_TESTSUITE_SKIP_BUILD=1 LOG_LEVEL=debug crystal spec --tag ${{ matrix.spec }} -v
    - name: Delete Cluster
      if: ${{ always() }}
      run: |
        source cluster.env
        docker ps -a
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        kubectl get all -A || true
        until kind delete cluster --name $CLUSTER --verbosity 1; do sleep 1; done
        rm -f /shared/pss/cluster-level-pss.$CLUSTER.yaml /tmp/cluster.yml
        rm -rf ~/.config/helm
      continue-on-error: true
  chaos:
    name: Chaos & Oran Tests
    needs: [tests]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      # Derived from CHAOS_TAGS in the `tests` job so the chaos matrix and the
      # spec-matrix exclusions share one source of truth and cannot drift.
      matrix: ${{ fromJson(needs.tests.outputs.chaos_matrix) }}
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
    - name: Sign in to Docker Hub with Helm
      run: |
        helm registry login \
          --username ${{ secrets.DOCKERHUB_USERNAME }} \
          --password ${{ secrets.DOCKERHUB_PASSWORD }} \
          registry-1.docker.io
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install kind
      uses: ./.github/actions/install-kind
    - name: Install kubectl
      run: |
        wget -O kubectl "https://dl.k8s.io/release/v1.28.3/bin/linux/amd64/kubectl"
        ls -la
        sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

    - name: Create Kind Cluster 
      run: |
        cat << EOF > /tmp/cluster.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        EOF
        export CLUSTER=$(uuidgen)
        echo "export CLUSTER=$CLUSTER" > cluster.env
        echo kind create cluster --name $CLUSTER --config=/tmp/cluster.yml --kubeconfig ./$CLUSTER.conf --retain --wait 5m
        kind --version
        kind create cluster --name $CLUSTER --config=/tmp/cluster.yml --kubeconfig ./$CLUSTER.conf --retain --wait 5m
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        kubectl get nodes
    - name: Install Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: 1.6.2
    - name: Setup CNF-Conformance
      run: |
        git fetch --all --tags --force
        shards install  
        echo "RUNNER: $RUNNER_NAME"
    - name: Run Crystal Spec
      run: |
        source cluster.env
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        until [[ $(kubectl get pods -l app=kindnet --namespace=kube-system -o 'jsonpath={..status.conditions[?(@.type=="Ready")].status}') == "True" ]]; do
            echo "Waiting for kindnet"
            sleep 1
        done
        LOG_LEVEL=debug crystal spec --tag ${{ matrix.tag }} -v
    - name: Delete Cluster
      if: ${{ always() }}
      run: |
        source cluster.env
        docker ps -a
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        kubectl get all -A || true
        until kind delete cluster --name $CLUSTER --verbosity 1; do sleep 1; done
        rm -f /tmp/cluster.yml
        rm -rf ~/.config/helm
      continue-on-error: true
  test_binary_configuration_lifecycle:
    name: Test Binary Without Source(config_lifecycle)
    runs-on: [v1.0.0]
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
    - name: Sign in to Docker Hub with Helm
      run: |
        helm registry login \
          --username ${{ secrets.DOCKERHUB_USERNAME }} \
          --password ${{ secrets.DOCKERHUB_PASSWORD }} \
          registry-1.docker.io
    - name: Cleanup Tmp DIR
      run: |
        sudo rm -rf /tmp/*
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install kind
      uses: ./.github/actions/install-kind
    - name: Build cnf-testsuite & Create Kind Cluster 
      run: |
        shards install
        crystal build src/cnf-testsuite.cr
        cat << EOF > /tmp/cluster.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        containerdConfigPatches:
        - |-
          root = "/tmp/containerd"
        nodes:
        - role: control-plane
          kubeadmConfigPatches:
          - |
            kind: ClusterConfiguration
            etcd:
              local:
                dataDir: /tmp/etcd
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        EOF
        export CLUSTER=$(uuidgen)
        echo "export CLUSTER=$CLUSTER"
        echo "export CLUSTER=$CLUSTER" > cluster.env
        kind --version
        kind create cluster --name $CLUSTER --config=/tmp/cluster.yml --kubeconfig /tmp/$CLUSTER.conf --retain --wait 5m
        export KUBECONFIG=/tmp/$CLUSTER.conf
        kubectl get nodes
    - name: Run Test Suite without source(config_lifecycle)
      run: |
        source cluster.env
        echo "SHARDS_INSTALL_PATH: $SHARDS_INSTALL_PATH"
        export KUBECONFIG=/tmp/$CLUSTER.conf
        export DIR=$(uuidgen)
        echo "Shared DIR: /shared/$DIR"
        mkdir /shared/$DIR
        mv cnf-testsuite /shared/$DIR 
        cd /shared/$DIR
        ./cnf-testsuite setup
        wget -O cnf-testsuite.yml https://raw.githubusercontent.com/lfn-cnti/testsuite/${GITHUB_SHA}/example-cnfs/coredns/cnf-testsuite.yml
        ./cnf-testsuite cnf_install cnf-config=./cnf-testsuite.yml
        LOG_LEVEL=debug ./cnf-testsuite all ~compatibility ~resilience ~reasonable_startup_time ~reasonable_image_size ~platform ~increase_capacity ~decrease_capacity ~install_script_helm ~helm_chart_valid ~helm_chart_published
        LOG_LEVEL=debug ./cnf-testsuite cnf_uninstall
        LOG_LEVEL=debug ./cnf-testsuite uninstall_all
    - name: Delete Cluster
      if: ${{ always() }}
      run: |
        source cluster.env
        docker ps -a
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        kubectl get all -A || true
        until kind delete cluster --name $CLUSTER --verbosity 1; do sleep 1; done
        rm -f /tmp/cluster.yml
        rm -rf ~/.config/helm
      continue-on-error: true
  test_binary_microservice:
    name: Test Binary Without Source(microservice)
    runs-on: [v1.0.0]
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
    - name: Sign in to Docker Hub with Helm
      run: |
        helm registry login \
          --username ${{ secrets.DOCKERHUB_USERNAME }} \
          --password ${{ secrets.DOCKERHUB_PASSWORD }} \
          registry-1.docker.io
    - name: Cleanup Tmp DIR
      run: |
        sudo rm -rf /tmp/*
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install kind
      uses: ./.github/actions/install-kind
    - name: Build cnf-testsuite & Create Kind Cluster 
      run: |
        shards install
        crystal build src/cnf-testsuite.cr
        cat << EOF > /tmp/cluster.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        containerdConfigPatches:
        - |-
          root = "/tmp/containerd"
        nodes:
        - role: control-plane
          kubeadmConfigPatches:
          - |
            kind: ClusterConfiguration
            etcd:
              local:
                dataDir: /tmp/etcd
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        EOF
        export CLUSTER=$(uuidgen)
        echo "export CLUSTER=$CLUSTER" > cluster.env
        kind --version
        kind create cluster --name $CLUSTER --config=/tmp/cluster.yml --kubeconfig /tmp/$CLUSTER.conf --retain --wait 5m
        export KUBECONFIG=/tmp/$CLUSTER.conf
        kubectl get nodes
    - name: Run Test Suite without source(microservice)
      run: |
        source cluster.env
        export KUBECONFIG=/tmp/$CLUSTER.conf
        export DIR=$(uuidgen)
        echo "Shared DIR: /shared/$DIR"
        mkdir /shared/$DIR
        mv cnf-testsuite /shared/$DIR
        cd /shared/$DIR
        ./cnf-testsuite setup
        wget -O cnf-testsuite.yml https://raw.githubusercontent.com/lfn-cnti/testsuite/${GITHUB_SHA}/example-cnfs/coredns/cnf-testsuite.yml
        ./cnf-testsuite cnf_install cnf-config=./cnf-testsuite.yml
        LOG_LEVEL=debug ./cnf-testsuite all ~resilience ~compatibility ~pod_network_latency ~platform ~increase_capacity ~decrease_capacity ~liveness ~readiness ~rolling_update ~rolling_downgrade ~rolling_version_change ~nodeport_not_used ~hostport_not_used ~hardcoded_ip_addresses_in_k8s_runtime_configuration ~install_script_helm ~helm_chart_valid ~helm_chart_published ~rollback ~secrets_used ~immutable_configmap
        LOG_LEVEL=debug ./cnf-testsuite cnf_uninstall
        LOG_LEVEL=debug ./cnf-testsuite uninstall_all
    - name: Delete Cluster
      if: ${{ always() }}
      run: |
        source cluster.env
        docker ps -a
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        kubectl get all -A || true
        until kind delete cluster --name $CLUSTER --verbosity 1; do sleep 1; done
        rm -f /tmp/cluster.yml
        rm -rf ~/.config/helm
      continue-on-error: true
  test_binary_all:
    name: Test Binary Without Source(all)
    runs-on: [v1.0.0]
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
    - name: Sign in to Docker Hub with Helm
      run: |
        helm registry login \
          --username ${{ secrets.DOCKERHUB_USERNAME }} \
          --password ${{ secrets.DOCKERHUB_PASSWORD }} \
          registry-1.docker.io
    - name: Cleanup Tmp DIR
      run: |
        sudo rm -rf /tmp/*
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install kind
      uses: ./.github/actions/install-kind
    - name: Build cnf-testsuite & Create Kind Cluster 
      run: |
        shards install
        crystal build src/cnf-testsuite.cr
        cat << EOF > /tmp/cluster.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        containerdConfigPatches:
        - |-
          root = "/tmp/containerd"
        nodes:
        - role: control-plane
          kubeadmConfigPatches:
          - |
            kind: ClusterConfiguration
            etcd:
              local:
                dataDir: /tmp/etcd
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        - role: worker
          extraMounts:
          - containerPath: /var/lib/kubelet/config.json
            hostPath: $HOME/.docker/config.json
        EOF
        export CLUSTER=$(uuidgen)
        echo "export CLUSTER=$CLUSTER" > cluster.env
        kind --version
        kind create cluster --name $CLUSTER --config=/tmp/cluster.yml --kubeconfig /tmp/$CLUSTER.conf --retain --wait 5m
        export KUBECONFIG=/tmp/$CLUSTER.conf
        kubectl get nodes
    - name: Run Test Suite without source(all)
      run: |
        source cluster.env
        export KUBECONFIG=/tmp/$CLUSTER.conf
        export DIR=$(uuidgen)
        echo "Shared DIR: /shared/$DIR"
        mkdir /shared/$DIR
        mv cnf-testsuite /shared/$DIR
        cd /shared/$DIR
        ./cnf-testsuite setup
        wget -O cnf-testsuite.yml https://raw.githubusercontent.com/lfn-cnti/testsuite/${GITHUB_SHA}/example-cnfs/coredns/cnf-testsuite.yml
        ./cnf-testsuite cnf_install cnf-config=./cnf-testsuite.yml
        LOG_LEVEL=debug ./cnf-testsuite all ~resilience ~platform ~liveness ~readiness ~rolling_update ~rolling_downgrade ~rolling_version_change ~nodeport_not_used ~hostport_not_used ~hardcoded_ip_addresses_in_k8s_runtime_configuration ~rollback ~secrets_used ~immutable_configmap ~reasonable_startup_time ~reasonable_image_size
        LOG_LEVEL=debug ./cnf-testsuite cnf_uninstall
        LOG_LEVEL=debug ./cnf-testsuite uninstall_all
    - name: Delete Cluster
      if: ${{ always() }}
      run: |
        source cluster.env
        docker ps -a
        export KUBECONFIG=$(pwd)/$CLUSTER.conf
        kubectl get all -A || true
        until kind delete cluster --name $CLUSTER --verbosity 1; do sleep 1; done
        rm -f /tmp/cluster.yml
        rm -rf ~/.config/helm
      continue-on-error: true
