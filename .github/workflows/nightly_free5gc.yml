name: free5GC validation
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  free5gc-validation:
    runs-on: [v1.0.0]
    steps:
      - name: Checkout Code & Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive 
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Setup Kind Cluster with Sysctl Patch
        run: |
          cat <<EOF > kind_setup.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          containerdConfigPatches:
          - |-
            root = "/tmp/containerd"
          nodes:
          - role: control-plane
            kubeadmConfigPatches:
            - |
              kind: KubeletConfiguration
              allowedUnsafeSysctls:
                - "net.ipv4.ip_forward"
                - "net.ipv4.conf.all.forwarding"
            - |
              kind: ClusterConfiguration
              etcd:
                local:
                  dataDir: /tmp/etcd
            extraMounts:
            - containerPath: /var/lib/kubelet/config.json
              hostPath: $HOME/.docker/config.json
          - role: worker
            kubeadmConfigPatches:
            - |
              kind: KubeletConfiguration
              allowedUnsafeSysctls:
                - "net.ipv4.ip_forward"
                - "net.ipv4.conf.all.forwarding"
            extraMounts:
            - containerPath: /var/lib/kubelet/config.json
              hostPath: $HOME/.docker/config.json
          - role: worker
            kubeadmConfigPatches:
            - |
              kind: KubeletConfiguration
              allowedUnsafeSysctls:
                - "net.ipv4.ip_forward"
                - "net.ipv4.conf.all.forwarding"
            extraMounts:
            - containerPath: /var/lib/kubelet/config.json
              hostPath: $HOME/.docker/config.json
          EOF
          wget -O kind "https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind create cluster --name free5gc-dev --config kind_setup.yaml --wait 5m
      - name: Build CNF Testsuite
        run: |
          shards install
          crystal build src/cnf-testsuite.cr
      - name: Run Free5GC Spec Test
        run: |
          LOG_LEVEL=INFO crystal spec spec/free5gc_cert_spec.cr -v
      - name: Delete Kind Cluster
        continue-on-error: true
        run: |
          until kind delete cluster --name free5gc-dev  --verbosity 1; do sleep 1; done
